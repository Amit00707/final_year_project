<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Midnight Scholar - Choose Your Interests</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#6e3900",
                      "on-primary-container": "#432100",
                      "on-tertiary": "#3c2f00",
                      "surface-container": "#221f1e",
                      "background": "#151312",
                      "on-tertiary-container": "#4e3e00",
                      "tertiary-fixed": "#ffe086",
                      "on-surface": "#e8e1df",
                      "outline-variant": "#554336",
                      "on-secondary-container": "#c9aeff",
                      "primary-container": "#d97707",
                      "primary-fixed-dim": "#ffb77d",
                      "on-surface-variant": "#dbc2b0",
                      "on-error": "#690005",
                      "surface-container-lowest": "#100e0d",
                      "on-secondary": "#3f008e",
                      "on-tertiary-fixed": "#231b00",
                      "secondary-container": "#6001d1",
                      "on-tertiary-fixed-variant": "#574500",
                      "inverse-surface": "#e8e1df",
                      "surface-dim": "#151312",
                      "tertiary-fixed-dim": "#eac33e",
                      "secondary-fixed-dim": "#d2bbff",
                      "on-primary-fixed": "#2f1500",
                      "surface-variant": "#373433",
                      "surface-container-low": "#1d1b1a",
                      "tertiary": "#eac33e",
                      "on-primary": "#4d2600",
                      "on-secondary-fixed": "#25005a",
                      "secondary": "#d2bbff",
                      "primary-fixed": "#ffdcc3",
                      "surface-tint": "#ffb77d",
                      "secondary-fixed": "#eaddff",
                      "inverse-primary": "#904d00",
                      "error": "#ffb4ab",
                      "outline": "#a38c7c",
                      "on-error-container": "#ffdad6",
                      "surface-container-high": "#2c2928",
                      "surface-container-highest": "#373433",
                      "error-container": "#93000a",
                      "surface": "#151312",
                      "primary": "#ffb77d",
                      "on-secondary-fixed-variant": "#5a00c6",
                      "inverse-on-surface": "#33302e",
                      "on-background": "#e8e1df",
                      "surface-bright": "#3c3837",
                      "tertiary-container": "#cda722"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Newsreader"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          }
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-selected-tint {
            background-color: rgba(217, 119, 6, 0.12);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
<!-- Top Navigation / Shell Suppression Check: Transactional Flow, No BottomNavBar/SideNav -->
<header class="fixed top-0 w-full z-50 bg-[#151312]/70 backdrop-blur-xl px-6 py-4 flex items-center justify-between">
<div class="font-headline italic text-2xl text-primary-container">The Midnight Scholar</div>
<!-- Progress Wizard -->
<nav class="absolute left-1/2 -translate-x-1/2 hidden md:flex items-center gap-8">
<div class="flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-primary-container text-on-primary-container text-[10px] font-bold">1</span>
<span class="text-primary font-semibold font-label text-[12px] tracking-widest uppercase">Interests</span>
</div>
<div class="w-8 h-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-surface-container-high text-on-surface-variant text-[10px] font-bold">2</span>
<span class="text-on-surface-variant font-label text-[12px] tracking-widest uppercase">Daily Goal</span>
</div>
<div class="w-8 h-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-surface-container-high text-on-surface-variant text-[10px] font-bold">3</span>
<span class="text-on-surface-variant font-label text-[12px] tracking-widest uppercase">First Book</span>
</div>
</nav>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-grow flex items-center justify-center pt-24 pb-32 px-6">
<div class="w-full max-w-[720px] mx-auto">
<!-- Header Section -->
<div class="text-center mb-12">
<h1 class="font-headline italic text-[36px] leading-tight text-on-surface mb-3">What Do You Love Reading?</h1>
<p class="font-body text-sm text-on-surface-variant/80">Choose at least 2 interests — our AI will personalize your library.</p>
</div>
<!-- Bento-ish Grid -->
<div class="relative">
<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
<!-- Card: Fiction (Pre-selected) -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border-[1.5px] border-primary-container bg-selected-tint transition-all duration-300 hover:bg-primary-container/20 group">
<span class="material-symbols-outlined text-primary-container mb-2" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
<span class="font-label text-[13px] font-medium tracking-tight">Fiction</span>
</button>
<!-- Card: Science (Pre-selected) -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border-[1.5px] border-primary-container bg-selected-tint transition-all duration-300 hover:bg-primary-container/20 group">
<span class="material-symbols-outlined text-primary-container mb-2" data-icon="biotech" style="font-variation-settings: 'FILL' 1;">biotech</span>
<span class="font-label text-[13px] font-medium tracking-tight">Science</span>
</button>
<!-- Card: History -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="history_edu">history_edu</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">History</span>
</button>
<!-- Card: Technology (Pre-selected) -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border-[1.5px] border-primary-container bg-selected-tint transition-all duration-300 hover:bg-primary-container/20 group">
<span class="material-symbols-outlined text-primary-container mb-2" data-icon="memory" style="font-variation-settings: 'FILL' 1;">memory</span>
<span class="font-label text-[13px] font-medium tracking-tight">Technology</span>
</button>
<!-- Card: Business -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="corporate_fare">corporate_fare</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Business</span>
</button>
<!-- Card: Self-Help -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="self_improvement">self_improvement</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Self-Help</span>
</button>
<!-- Card: Philosophy -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="psychology_alt">psychology_alt</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Philosophy</span>
</button>
<!-- Card: Mathematics -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="functions">functions</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Mathematics</span>
</button>
<!-- Card: Psychology -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="neurology">neurology</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Psychology</span>
</button>
<!-- Card: Art & Design -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="palette">palette</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Art &amp; Design</span>
</button>
<!-- Card: Biography -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="person_book">person_book</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Biography</span>
</button>
<!-- Card: Economics -->
<button class="flex flex-col items-center justify-center h-[100px] rounded-xl border border-transparent bg-surface-container-low transition-all duration-300 hover:bg-surface-container-high hover:scale-[1.02] active:scale-95 group">
<span class="material-symbols-outlined text-primary mb-2" data-icon="trending_up">trending_up</span>
<span class="font-label text-[13px] font-medium tracking-tight text-on-surface-variant group-hover:text-on-surface">Economics</span>
</button>
</div>
<!-- AI Badge -->
<div class="absolute -bottom-10 left-0 flex items-center gap-2 px-4 py-1.5 rounded-full bg-secondary-container/20 border border-secondary/10 backdrop-blur-sm shadow-[0_0_15px_rgba(210,187,255,0.05)]">
<span class="material-symbols-outlined text-secondary text-[14px]" data-icon="auto_awesome">auto_awesome</span>
<span class="text-secondary font-label text-[10px] uppercase tracking-wider font-semibold">AI will use these to personalize your feed</span>
</div>
<!-- Selection Counter -->
<div class="mt-16 text-center">
<p class="text-on-surface-variant font-label text-[12px] uppercase tracking-[0.1em] font-medium">3 interests selected</p>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Bar -->
<footer class="fixed bottom-0 w-full bg-[#151312]/80 backdrop-blur-2xl px-8 py-6 flex items-center justify-between shadow-[0px_-10px_30px_rgba(0,0,0,0.5)]">
<a class="text-stone-500 font-label text-[13px] font-medium hover:text-amber-200 transition-colors" href="#">Skip for now</a>
<button class="flex items-center gap-3 px-8 py-3 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold text-sm shadow-[0_0_20px_rgba(217,119,6,0.2)] hover:scale-105 active:scale-95 transition-all">
            Next: Set Daily Goal
            <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<!-- Background Accents (Visual Depth) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute top-[40%] -right-[5%] w-[30%] h-[30%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
</body></html>
