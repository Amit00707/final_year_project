<body class="bg-surface-dim font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

<div class="absolute top-0 left-0 w-full h-full glow-overlay pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/10 blur-[100px] rounded-full"></div>

</header>
<!-- Neumorphic Login Card -->
<div class="neumorphic-card rounded-3xl p-8 md:p-10 transition-transform duration-300">
<div class="mb-8">
<h2 class="font-headline italic text-3xl text-on-surface mb-1">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Resume your journey through the digital archives.</p>
</div>
<!-- Social Auth Cluster -->
<div class="flex flex-col gap-3 mb-8">
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container hover:bg-surface-container-high transition-all rounded-xl text-on-surface font-medium border border-outline-variant/10">
<img alt="" class="w-5 h-5 grayscale opacity-80" data-alt="minimal google logo icon in monochromatic light grey" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBq5NX6JvuDkMVDRCJTJx5oP9V4cOVrDMqaRFb-eLX3QDsIZEFwj_bbLTMrx4KFI4XnszSh0mKamOSZ6BNklJ1gqJ1eCnKV8qYGHAYPrrivwsA21fKUd6rwx0X0B09tFnyf0Bk7YxFI32LlJiUsob8LD3fyoxuinCHIzwIg2iS0eIW7hIEUsb2XuKhcjG0Pj8nbDeTPwW27x9XcemscynPxdezN7p7meJPzYvSKZanBELrYXi7QtAsK54hhuSufBxaDqHwbFRr07l8"/>
                    Continue with Google
                </button>
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container hover:bg-surface-container-high transition-all rounded-xl text-on-surface font-medium border border-outline-variant/10">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Continue with Apple
                </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<span class="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-semibold">or continue with email</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold tracking-widest text-primary/80 uppercase ml-1">Email Address</label>
<div class="neumorphic-inset rounded-xl h-14 flex items-center px-4 transition-all focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined text-stone-500 mr-3 text-xl">mail</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-stone-600 w-full text-sm" placeholder="scholar@library.ai" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold tracking-widest text-primary/80 uppercase">Password</label>
<a class="text-[10px] uppercase font-bold tracking-tighter text-stone-500 hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="neumorphic-inset rounded-xl h-14 flex items-center px-4 transition-all focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined text-stone-500 mr-3 text-xl">lock</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-stone-600 w-full text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-14 bg-gradient-to-br from-primary-container to-primary text-on-primary-fixed font-bold rounded-full shadow-[0_4px_20px_rgba(217,119,7,0.3)] hover:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Enter the Sanctuary
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer -->
<footer class="mt-8 text-center">
<p class="text-stone-500 text-sm">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Sign up for access</a>
</p>
</footer>
</main>
